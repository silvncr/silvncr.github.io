    <script defer>
        window.onload = () => {
            for (const [key, val] of Object.entries(
                {
                    dev: {

                    gaming: {
                        // cedb: 'https://cedb.me/user/2a45a00e-40c2-49d8-aab9-14edd2791c65',

                        speedrun: 'https://speedrun.com/users/riverpaper',
                        steam: 'https://steamcommunity.com/id/silvncr',
                    },
                    music: {
                        bandcamp: 'https://riverpaper.bandcamp.com/',
                        musescore: 'https://musescore.com/user/38096226',
                        // _spotify: 'https://open.spotify.com/artist/0c6XPiWIn7uYlWB9B6puvo',
                    },
                    social: {
                        bluesky: 'https://bsky.app/profile/riverpaper.github.io',
                        discord: 'https://discord.com/invite/wkcJzKDUCU',
                        // _instagram: 'https://instagram.com/silvncr/',
                    },
                    video: {
                        twitch: 'https://twitch.tv/riverpaper_',
                        youtube: 'https://youtube.com/@riverpaper',
                    },
                }
            )) {
                let links = [];
                for (const [name, link] of Object.entries(val)) {
                    // let a = document.createElement('a');
                    // a.textContent = name;
                    // a.href = link;
                    // a.setAttribute('name', name);
                    // a.setAttribute('rel', 'noopener noreferrer');
                    // a.setAttribute('target', '_blank');
                    // links.push(a);
                    links.push(
                        name.startsWith('_')
                            ? `<a class="empty-link"><del>${name.replace(/_/, '')}</del></a>`
                            : `<a href="${link}" name="${name}" rel="noopener noreferrer" target="_blank">${name}</a>`
                    );
                }
                console.log(links);
                let li = document.createElement('li');
                li.innerHTML = links.join(', ');
                let ul = document.createElement('ul');
                ul.appendChild(li);
                let p = document.createElement('p');
                p.textContent = key;
                p.appendChild(ul);
                document.getElementById('links').appendChild(p);
            }
